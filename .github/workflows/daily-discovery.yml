name: Daily discovery

# No GitHub `schedule:` trigger on purpose (issue #4) — scheduling lives in
# Supabase pg_cron, which calls this workflow via the workflow_dispatch API at
# 22:00 UTC (~6pm ET, post-close) Mon-Fri, function public.dispatch_github_workflow.
# This file only defines workflow_dispatch.

on:
  workflow_dispatch:            # fired by Supabase pg_cron (and manual test runs)
    inputs:
      alerts_enabled:
        description: "Send real candidate pushes? Set false for a safe dry run"
        type: boolean
        default: true
      region:
        description: "Discovery region: 'na' (US+Canada, post-US-close) or 'in' (NSE, post-NSE-close)"
        type: string
        default: "na"

concurrency:
  group: daily-discovery
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily discovery
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Discovery's OWN models — separate per-model free-tier quota bucket,
          # so discovery can't eat into the watchlist's 3.5 allowance. Override
          # via repo Variables (Settings > Secrets and variables > Actions >
          # Variables); falls back to these if unset.
          DISCOVERY_GEMINI_MODEL: ${{ vars.DISCOVERY_GEMINI_MODEL || 'gemini-2.5-flash' }}
          DISCOVERY_GEMINI_MODEL_BACKUP: ${{ vars.DISCOVERY_GEMINI_MODEL_BACKUP || 'gemini-2.5-flash-lite' }}
          # Live alerting by default. A manual workflow_dispatch can set
          # alerts_enabled=false for a safe dry run (DryRunNotifier logs the
          # would-be candidate push instead of sending it). Scheduled pg_cron
          # dispatches send NO inputs, so the default (true) applies and live
          # alerting is unchanged. No `|| 'true'` fallback: `false || 'true'`
          # is truthy in GitHub expressions and would defeat the toggle.
          ALERTS_ENABLED: ${{ inputs.alerts_enabled }}
          # Region select (D5). pg_cron's post-US-close dispatch sends no inputs, so
          # this defaults to 'na'; the NSE-close dispatch passes region=in.
          DISCOVERY_REGION: ${{ inputs.region || 'na' }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # NSE candidates route to the NSE topic (FR18); falls back to NTFY_TOPIC if unset.
          NSE_NTFY_TOPIC: ${{ secrets.NSE_NTFY_TOPIC }}
          DETAIL_PAGE_BASE: ${{ secrets.DETAIL_PAGE_BASE }}
        run: python scripts/run_discovery.py
