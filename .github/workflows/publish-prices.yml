name: Publish dashboard prices (issue #18 fallback)

# Issue #18: the browser can't fetch Yahoo directly (CORS-blocked). This runner
# fetches live-ish prices server-side (yfinance) and commits pages/prices.json,
# which the dashboard reads same-origin. Scheduling on the market cadence is added
# in the Phase-6/7 activation step (pg_cron dispatch, ref main); for now it runs on
# manual dispatch and on push of the script (which also seeds the first prices.json).

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/publish_prices.py"
      - ".github/workflows/publish-prices.yml"

permissions:
  contents: write

concurrency:
  group: publish-prices
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/publish_prices.py

      - name: Commit prices.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/prices.json
          if git diff --cached --quiet; then
            echo "prices.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh dashboard prices.json [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
