name: Hourly watchlist check

# No GitHub `schedule:` trigger on purpose. GitHub's cron is best-effort and was
# silently DROPPING most scheduled ticks (issue #4), so scheduling now lives in
# Supabase pg_cron, which calls this workflow via the workflow_dispatch API on a
# reliable */30 13-21 UTC, Mon-Fri cadence (function public.dispatch_github_workflow).
# This file only defines workflow_dispatch; run_hourly.py still does the precise
# America/New_York market-open gate, so off-hours/holiday dispatches just no-op.

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if the market is closed (testing/backfill)"
        type: boolean
        default: false
      alerts_enabled:
        description: "Send real pushes? Set false for a safe off-hours dry run"
        type: boolean
        default: true

# Serialize runs so two never mutate verdict_state at once (design 7.4).
concurrency:
  group: hourly-watchlist
  cancel-in-progress: false

jobs:
  watchlist:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hourly watchlist check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Repository variables (Settings -> Secrets and variables -> Actions ->
          # Variables tab), not secrets -- model names aren't sensitive, and this
          # way you can swap models from the GitHub UI with no commit. Falls back
          # to the literal on the right if the variable isn't set.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          GEMINI_MODEL_BACKUP: ${{ vars.GEMINI_MODEL_BACKUP || 'gemini-3.1-flash-lite' }}
          # NSE watchlist model pair (design §12 D3) — same Variable-driven
          # pattern, own free-tier quota bucket. Unset -> falls back to the US/TSX
          # models (NSE runs in a separate, non-overlapping session). Explicit
          # fallback so the env var is never an empty string.
          NSE_GEMINI_MODEL: ${{ vars.NSE_GEMINI_MODEL || vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          NSE_GEMINI_MODEL_BACKUP: ${{ vars.NSE_GEMINI_MODEL_BACKUP || vars.GEMINI_MODEL_BACKUP || 'gemini-3.1-flash-lite' }}
          # Live alerting by default. A manual workflow_dispatch can set
          # alerts_enabled=false for a safe dry run (DryRunNotifier logs the
          # composed push instead of sending it). Scheduled pg_cron dispatches
          # send NO inputs, so the input default (true) applies and live
          # alerting is unchanged. No `|| 'true'` fallback: in GitHub
          # expressions `false || 'true'` is truthy and would defeat the toggle.
          ALERTS_ENABLED: ${{ inputs.alerts_enabled }}
          # Set by the workflow_dispatch toggle; gated (market-open check) when
          # the pg_cron dispatch fires it without inputs.
          FORCE_RUN: ${{ inputs.force_run }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # NSE alerts route here (FR18 / §12 D7). Unset -> notify.py falls back
          # to NTFY_TOPIC, so NSE alerts still land (just not separated yet).
          NSE_NTFY_TOPIC: ${{ secrets.NSE_NTFY_TOPIC }}
          DETAIL_PAGE_BASE: ${{ secrets.DETAIL_PAGE_BASE }}
        run: python scripts/run_hourly.py
